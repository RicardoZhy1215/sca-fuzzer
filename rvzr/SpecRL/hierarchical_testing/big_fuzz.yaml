instruction_set: x86-64

# Model
contract_observation_clause: ct
contract_execution_clause:
  - delayed-exception-handling
# ct + delayed-exception-handling (DEH): the contract models transient execution
# that continues PAST a faulting instruction. A violation = hardware leaks beyond
# that. NOTE: DEH only does something if the program actually FAULTS — with
# sandboxed (masked) loads that never fault, DEH degenerates to seq. The only
# fault source in the current action space is div_r (divide-by-zero). See worker
# override in hi_SpecEnv.py.

# Actors
actors:
  - main:
    - data_properties:
      - present: false

# Executor
executor_mode: P+P
x86_executor_enable_ssbp_patch: true   # SSBD ON (store bypass mitigated in hardware)

# Program generator
program_size: 50
avg_mem_accesses: 16
max_bb_per_function: 1  # single basic block (no branches; DEH is fault-based, not branch-based)
min_bb_per_function: 1
min_successors_per_bb: 1
max_successors_per_bb: 1  # 1 successor (-> exit); no conditional branch

instruction_categories:
  - BASE-BINARY
  - BASE-BITBYTE
  - BASE-CMOV
  - BASE-COND_BR
  - BASE-CONVERT
  - BASE-DATAXFER
  - BASE-FLAGOP
  - BASE-LOGICAL
  - BASE-MISC
  - BASE-NOP
  - BASE-WIDENOP
  - BASE-POP
  - BASE-PUSH
  - BASE-SEMAPHORE
  - BASE-SETCC
  # - BASE-STRINGOP  # commented out as it triggers a known information leak
  - LONGMODE-CONVERT
  - LONGMODE-DATAXFER
  - LONGMODE-SEMAPHORE
  # - LONGMODE-STRINGOP  # commented out as it triggers a known information leak
  - SSE-DATAXFER
  - SSE-LOGICAL_FP
  - SSE-MISC
  - SSE-SSE

# Input generator
data_generator_entropy_bits: 24
inputs_per_class: 2

# Fuzzer
enable_speculation_filter: true
enable_observation_filter: true
enable_fast_path_model: true
# coverage_type: model_instructions

# Overwrite some of the configuration options to reproduce the violation
# data_generator_seed: 11110
