instruction_set: x86-64

# Model
contract_observation_clause: ct
contract_execution_clause:
  - cond
# NOTE: dropped 'bpas' — with SSBD ON below the hardware can't do store bypass,
# so modeling v4 is pointless. Goal here: find leaks beyond v1 (and beyond v4,
# which is hardware-disabled). See worker override in hi_SpecEnv.py.

# Actors
actors:
  - main:
    - data_properties:
      - present: true

# Executor
executor_mode: P+P
x86_executor_enable_ssbp_patch: true   # SSBD ON (store bypass mitigated in hardware)

# Program generator
program_size: 50
avg_mem_accesses: 16
max_bb_per_function: 2  # 2 BBs with a conditional branch between them (for cond/v1)
min_bb_per_function: 2
min_successors_per_bb: 2
max_successors_per_bb: 2  # allow a BB to have 2 successors = a conditional branch

instruction_categories:
  - BASE-BINARY
  - BASE-BITBYTE
  - BASE-CMOV
  - BASE-COND_BR
  - BASE-CONVERT
  - BASE-DATAXFER
  - BASE-FLAGOP
  - BASE-LOGICAL
  - BASE-MISC
  - BASE-NOP
  - BASE-WIDENOP
  - BASE-POP
  - BASE-PUSH
  - BASE-SEMAPHORE
  - BASE-SETCC
  # - BASE-STRINGOP  # commented out as it triggers a known information leak
  - LONGMODE-CONVERT
  - LONGMODE-DATAXFER
  - LONGMODE-SEMAPHORE
  # - LONGMODE-STRINGOP  # commented out as it triggers a known information leak
  - SSE-DATAXFER
  - SSE-LOGICAL_FP
  - SSE-MISC
  - SSE-SSE

# Input generator
data_generator_entropy_bits: 24
inputs_per_class: 2

# Fuzzer
enable_speculation_filter: true
enable_observation_filter: true
enable_fast_path_model: true
# coverage_type: model_instructions

